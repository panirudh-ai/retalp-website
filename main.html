<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retalp — AI Execution Layer for Enterprise Operations</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Sans:ital,wdth,wght@0,75..100,400..700;1,75..100,400..500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0f172a; }

  :root {
    --g-mid:    #059669;
    --g-vivid:  #10b981;
    --ease-smooth: cubic-bezier(.4,0,.2,1);
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
    --sans: 'Instrument Sans', sans-serif;
  }

  /* ── Nav ── */
  .nav-island {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: flex; align-items: center; gap: 6px;
    padding: 8px 10px 8px 16px;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(61,184,112,0.25); border-radius: 100px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(61,184,112,0.08) inset;
    transition: all .35s var(--ease-smooth); white-space: nowrap;
  }
  .nav-logo-pill {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; margin-right: 8px; cursor: pointer;
    background: none; border: none;
  }
  .nav-logo-mark {
    width: 28px; height: 28px; background: transparent; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .nav-logo-mark img { width: 20px; height: 20px; object-fit: contain; }
  .nav-logo-text {
    font-family: var(--sans); font-weight: 700; font-size: 1rem;
    letter-spacing: -0.02em; color: #ffffff;
  }
  .nav-logo-text span { color: var(--g-vivid); }
  .nav-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.15); margin: 0 4px; }
  .nav-link {
    position: relative; display: flex; flex-direction: column;
    align-items: center; gap: 3px; padding: 6px 14px;
    font-size: 0.82rem; font-weight: 500; font-family: var(--sans);
    color: rgba(255,255,255,0.6); text-decoration: none; border-radius: 100px;
    transition: color 0.2s; cursor: pointer; background: none; border: none;
  }
  .nav-link::before {
    content: ""; position: absolute; top: 3px; left: 50%; width: 5px; height: 5px;
    background: var(--g-vivid); border-radius: 50%; opacity: 0;
    transition: opacity .2s var(--ease-smooth), transform .2s var(--ease-spring);
    transform: translateX(-50%) translateY(2px) scale(0);
  }
  .nav-link:hover { color: #ffffff; }
  .nav-link:hover::before { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .nav-link.active { color: #ffffff; }
  .nav-link.active::before { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .nav-cta {
    display: flex; align-items: center; gap: 8px; padding: 10px 22px;
    background: var(--g-mid); color: #ffffff; font-size: 0.85rem;
    font-weight: 600; font-family: var(--sans);
    border-radius: 100px; border: none; cursor: pointer;
    text-decoration: none; transition: all .25s var(--ease-smooth);
  }
  .nav-cta:hover {
    background: var(--g-vivid);
    box-shadow: rgba(61,184,112,0.35) 0 0 28px 4px;
    transform: scale(1.04);
  }
  .nav-cta svg { width: 14px; height: 14px; }

  @media (max-width: 768px) {
    .nav-island { left: 20px; right: 20px; transform: none; top: 16px; }
    .nav-link { display: none; }
  }

  /* ── Iframe fills full viewport (nav floats above) ── */
  #content-frame {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
</style>
</head>
<body>

<nav class="nav-island" id="navIsland">
  <button class="nav-logo-pill" onclick="loadPage('index3.html', null)">
    <div class="nav-logo-mark">
      <img src="favicon.ico" alt="Retalp">
    </div>
    <span class="nav-logo-text">Retal<span>p</span></span>
  </button>
  <div class="nav-sep"></div>
  <button class="nav-link" data-nav="retalpE3"    onclick="loadPage('retalpE3.html', this)">Retalp E³</button>
  <button class="nav-link" data-nav="capabilities" onclick="loadPage('retalp_capabilities.html', this)">Capabilities</button>
  <button class="nav-link" data-nav="results"     onclick="loadPage('index3.html#impact', this)">Results</button>
  <button class="nav-link" data-nav="process"     onclick="loadPage('index3.html#roadmap', this)">Process</button>
  <button class="nav-cta"                         onclick="loadPage('index3.html#pilot', null)">
    Start a Pilot
    <svg viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10m0 0L7 2m5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</nav>

<iframe id="content-frame" src="index3.html"></iframe>

<script>
  function loadPage(url, clickedEl) {
    document.getElementById('content-frame').src = url;
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    if (clickedEl) clickedEl.classList.add('active');
  }
</script>

</body>
</html>
