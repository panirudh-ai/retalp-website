<body>

<iframe id="content-frame" src="index3.html"></iframe>

<script>
  function loadPage(url, clickedEl) {
    document.getElementById('content-frame').src = url;
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    if (clickedEl) clickedEl.classList.add('active');
    // Reset theme on page change; iframe will send correct theme once loaded
    document.getElementById('navIsland').classList.remove('nav-light-bg');
  }

  // Intercept navbar.js link clicks to load pages in the iframe instead of navigating away
  document.addEventListener('click', function(e) {
    const link = e.target.closest('#navIsland a');
    if (!link) return;
    e.preventDefault();
    loadPage(link.getAttribute('href'), link.classList.contains('nav-link') ? link : null);
  });

  // Listen for theme messages from iframe
  window.addEventListener('message', function(e) {
    if (e.data && e.data.retalpNavTheme) {
      document.getElementById('navIsland').classList.toggle('nav-light-bg', e.data.retalpNavTheme === 'dark');
    }
  });
</script>
