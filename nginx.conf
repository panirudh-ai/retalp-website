server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        # Define index3.html as the primary index file
        index  index3.html index.htm;
        
        # This will:
        # 1. Search for the exact URI ($uri)
        # 2. Search for the URI with .html ($uri.html) - this gives you clean URLs
        # 3. Search for the URI as a directory ($uri/) and look for index3.html inside it
        # 4. Fallback to 404
        try_files $uri $uri.html $uri/ =404;
    }

    # Handle 404 errors (uses your 404.html if you create one)
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Handle server errors (50x)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
